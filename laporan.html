<!DOCTYPE html>
<html lang="id">
<head>
  <base target="_top"><meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#f0f4ff;--surface:#fff;--surface2:#f7f9ff;--border:#e2e8f5;--primary:#2d5be3;--primary2:#1a3ebf;--pl:#eef2ff;--text:#0f172a;--muted:#64748b;--success:#059669;--warning:#d97706;--danger:#dc2626;--radius:10px}
    html,body{height:100%;overflow:hidden}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text)}
    .page{display:flex;flex-direction:column;height:100%;padding:18px;gap:14px;overflow-y:auto}
    .page::-webkit-scrollbar{width:4px}.page::-webkit-scrollbar-thumb{background:var(--border)}
    .toolbar{display:flex;align-items:center;gap:10px;flex-shrink:0}
    .toolbar h2{font-size:16px;font-weight:800;flex:1}
    .mode-tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);padding:3px;border-radius:9px}
    .mtab{padding:6px 16px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--muted);border:none;background:none;font-family:inherit}
    .mtab.active{background:var(--primary);color:#fff}
    .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;flex-shrink:0}
    .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden}
    .kpi::after{content:"";position:absolute;top:0;left:0;right:0;height:3px}
    .kpi.blue::after{background:linear-gradient(90deg,var(--primary),#818cf8)}
    .kpi.green::after{background:linear-gradient(90deg,var(--success),#34d399)}
    .kpi.orange::after{background:linear-gradient(90deg,var(--warning),#fbbf24)}
    .kpi.red::after{background:linear-gradient(90deg,var(--danger),#f87171)}
    .kpi .ki{font-size:22px;margin-bottom:8px}
    .kpi .kl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
    .kpi .kv{font-size:18px;font-weight:800}
    .kpi.blue .kv{color:var(--primary)}.kpi.green .kv{color:var(--success)}.kpi.orange .kv{color:var(--warning)}.kpi.red .kv{color:var(--danger)}
    .charts-row{display:grid;grid-template-columns:2fr 1fr;gap:14px;flex-shrink:0}
    .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
    .chart-card h4{font-size:13px;font-weight:700;margin-bottom:14px}
    .bottom-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;flex-shrink:0}
    .bottom-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
    .bottom-card h4{font-size:13px;font-weight:700;margin-bottom:14px}
    .tipe-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
    .tipe-item:last-child{border-bottom:none}
    .tipe-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .tipe-nm{flex:1;font-size:13px;font-weight:500}
    .tipe-val{font-size:13px;font-weight:700;color:var(--primary)}
    .bar-bg{background:var(--surface2);border-radius:4px;height:4px;margin-top:5px;overflow:hidden}
    .bar-fill{height:100%;border-radius:4px;transition:width .8s ease}
    .jt-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
    .jt-item:last-child{border-bottom:none}
    .jt-ava{width:32px;height:32px;background:var(--pl);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;color:var(--primary);font-weight:700}
    .jt-info{flex:1}
    .jt-nm{font-size:13px;font-weight:500}
    .jt-km{font-size:11px;color:var(--muted);margin-top:1px}
    .jt-hp{font-size:12px;color:var(--primary)}
    .badge-blm{background:#fef3c7;color:#92400e;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap}
    .empty-info{text-align:center;padding:20px;color:var(--muted);font-size:13px}
    /* RESPONSIVE */
    @media(max-width:600px){
      .page{padding:12px;gap:10px}
      .kpi-row{grid-template-columns:1fr 1fr}
      .kpi{padding:12px}
      .kpi .ki{font-size:18px;margin-bottom:5px}
      .kpi .kv{font-size:15px}
      .charts-row{grid-template-columns:1fr}
      .bottom-row{grid-template-columns:1fr}
      .toolbar h2{font-size:15px}
    }
    @media(max-width:400px){
      .kpi-row{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
<div class="page">
  <div class="toolbar">
    <h2>&#x1F4CA; Laporan &amp; Grafik</h2>
    <div class="mode-tabs">
      <button class="mtab active" id="tab-bulanan" onclick="switchMode('bulanan')">Bulanan</button>
      <button class="mtab" id="tab-tahunan" onclick="switchMode('tahunan')">Tahunan</button>
    </div>
  </div>
  <div class="kpi-row">
    <div class="kpi blue"><div class="ki">&#x1F4B0;</div><div class="kl">Total Pendapatan</div><div class="kv" id="kPend">—</div></div>
    <div class="kpi green"><div class="ki">&#x1F4CB;</div><div class="kl">Total Transaksi</div><div class="kv" id="kTrx">—</div></div>
    <div class="kpi orange"><div class="ki">&#x1F6AA;</div><div class="kl">Tingkat Okupansi</div><div class="kv" id="kOkup">—</div></div>
    <div class="kpi red"><div class="ki">&#x1F465;</div><div class="kl">Penyewa Aktif</div><div class="kv" id="kPenyewa">—</div></div>
  </div>
  <div class="charts-row">
    <div class="chart-card">
      <h4>&#x1F4C8; Grafik Pendapatan</h4>
      <div style="position:relative;height:210px"><canvas id="cPend"></canvas></div>
    </div>
    <div class="chart-card">
      <h4>&#x1F4CA; Jumlah Pembayaran</h4>
      <div style="position:relative;height:210px"><canvas id="cTrx"></canvas></div>
    </div>
  </div>
  <div class="bottom-row">
    <div class="bottom-card">
      <h4>&#x1F3F7;&#xFE0F; Pendapatan per Tipe Kamar</h4>
      <div id="tipeList"><div class="empty-info">&#x23F3; Memuat...</div></div>
    </div>
    <div class="bottom-card">
      <h4>&#x26A0;&#xFE0F; Penyewa Belum Bayar Bulan Ini</h4>
      <div id="jtList"><div class="empty-info">&#x23F3; Memuat...</div></div>
    </div>
  </div>
</div>
<script>
  var mode="bulanan", cP=null, cT=null;
  var COLORS=["#2d5be3","#059669","#d97706","#dc2626","#7c3aed","#0284c7"];
  function fmt(n){ return Number(n).toLocaleString("id-ID"); }
  Chart.defaults.color="#64748b"; Chart.defaults.borderColor="#e2e8f5";
  window.onload=function(){ loadAll(); };
  function switchMode(m){
    mode=m;
    document.querySelectorAll(".mtab").forEach(function(t){ t.classList.remove("active"); });
    document.getElementById("tab-"+m).classList.add("active");
    loadAll();
  }
  function loadAll(){
    google.script.run.withSuccessHandler(render).withFailureHandler(function(e){ console.error(e.message); }).getLaporan(mode);
    google.script.run.withSuccessHandler(renderJT).getDashboardSummary();
  }
  function render(d){
    document.getElementById("kPend").innerText="Rp "+fmt(d.totalPendapatan);
    document.getElementById("kTrx").innerText=d.totalTransaksi+" trx";
    document.getElementById("kOkup").innerText=d.okupansi+"% ("+d.kamarTerisi+"/"+d.totalKamar+")";
    document.getElementById("kPenyewa").innerText=d.penyewaAktif+" orang";
    if(cP) cP.destroy();
    var ctx1=document.getElementById("cPend").getContext("2d");
    var grad=ctx1.createLinearGradient(0,0,0,200);
    grad.addColorStop(0,"rgba(45,91,227,.2)"); grad.addColorStop(1,"rgba(45,91,227,.01)");
    cP=new Chart(ctx1,{type:"line",data:{labels:d.labels,datasets:[{label:"Pendapatan",data:d.totals,borderColor:"#2d5be3",backgroundColor:grad,borderWidth:2.5,pointBackgroundColor:"#2d5be3",pointRadius:4,pointHoverRadius:6,fill:true,tension:.4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:"rgba(226,232,245,.8)"},ticks:{font:{size:11}}},y:{grid:{color:"rgba(226,232,245,.8)"},ticks:{font:{size:11},callback:function(v){ return "Rp "+fmt(v); }}}}}});
    if(cT) cT.destroy();
    var ctx2=document.getElementById("cTrx").getContext("2d");
    cT=new Chart(ctx2,{type:"bar",data:{labels:d.labels,datasets:[{label:"Transaksi",data:d.counts,backgroundColor:"rgba(5,150,105,.15)",borderColor:"#059669",borderWidth:1.5,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:"rgba(226,232,245,.8)"},ticks:{font:{size:11},stepSize:1}}}}});
    var tipes=Object.keys(d.tipeSales);
    if(!tipes.length){ document.getElementById("tipeList").innerHTML="<div class=\"empty-info\">Belum ada data.</div>"; return; }
    var maxVal=Math.max.apply(null,tipes.map(function(k){ return d.tipeSales[k]; }));
    document.getElementById("tipeList").innerHTML=tipes.sort(function(a,b){ return d.tipeSales[b]-d.tipeSales[a]; }).map(function(t,i){
      var pct=maxVal?Math.round(d.tipeSales[t]/maxVal*100):0;
      return "<div class=\"tipe-item\"><div class=\"tipe-dot\" style=\"background:"+COLORS[i%COLORS.length]+"\"></div><div style=\"flex:1\"><div class=\"tipe-nm\">"+t+"</div><div class=\"bar-bg\"><div class=\"bar-fill\" style=\"width:"+pct+"%;background:"+COLORS[i%COLORS.length]+"\"></div></div></div><div class=\"tipe-val\">Rp "+fmt(d.tipeSales[t])+"</div></div>";
    }).join("");
  }
  function renderJT(s){
    var jt=s.jatuhTempo||[];
    if(!jt.length){ document.getElementById("jtList").innerHTML="<div class=\"empty-info\" style=\"color:#059669\">Semua penyewa sudah bayar!</div>"; return; }
    document.getElementById("jtList").innerHTML=jt.map(function(p,i){
      return "<div class=\"jt-item\"><div class=\"jt-ava\">"+(i+1)+"</div><div class=\"jt-info\"><div class=\"jt-nm\">"+p.nama+"</div><div class=\"jt-km\">Kamar "+p.kamar+"</div></div><div style=\"text-align:right\"><div class=\"jt-hp\">"+p.hp+"</div><div style=\"margin-top:3px\"><span class=\"badge-blm\">Belum Bayar</span></div></div></div>";
    }).join("");
  }
</script>
</body>
</html>
